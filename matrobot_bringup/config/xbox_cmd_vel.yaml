teleop_twist_joy:
  ros__parameters:
    require_enable_button: false
    enable_turbo_button: -1

    axis_linear:
      x: 1

    scale_linear:
      x: 0.50

    scale_linear_turbo:
      x: 0.80

    axis_angular:
      yaw: 0

    scale_angular:
      yaw: 0.80

    scale_angular_turbo:
      yaw: 1.20
