teleop_twist_joy:
  ros__parameters:
    require_enable_button: false
    enable_turbo_button: -1

    axis_linear:
      x: 1

    scale_linear:
      x: 1.0

    scale_linear_turbo:
      x: 1.5

    axis_angular:
      yaw: 0

    scale_angular:
      yaw: 1.5

    scale_angular_turbo:
      yaw: 2.0
